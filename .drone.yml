---
kind: pipeline
name: default
steps:

- name: generate-tags
  image: quay.io/natlibfi/drone-gen-tags

- name: audit
  image: node:12
  commands:
  - npm audit --package-lock-only --audit-level=moderate --production

- name: install
  image: node:12
  commands:
  - npm ci
  environment:
    NPM_CONFIG_IGNORE_SCRIPTS: true

- name: test
  image: node:12
  commands:
  - npm test

- name: build
  image: node:12
  commands:
    - npm run build
    - NPM_CONFIG_IGNORE_SCRIPTS=true npm ci --production

- name: static-security-scan
  image: quay.io/natlibfi/njsscan
  commands:
    - njsscan dist

- name: docker
  image: plugins/docker
  settings:
    repo: quay.io/natlibfi/melinda-record-import-controller
    registry: quay.io
    username:
      from_secret: docker_username
    password:
      from_secret: docker_password
